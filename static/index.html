<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immigration Translation Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0f0ec;
  font-family: 'Times New Roman', serif;
  color: #3a3a2e;
  min-height: 100vh;
  padding: 32px;
}
.container { max-width: 800px; margin: 0 auto; }

/* Glossary Bar */
.glossary-bar {
  background: #fff;
  border: 1px solid #d0d0c8;
  border-radius: 6px;
  padding: 14px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.glossary-bar .label {
  color: #5a4a3a;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: bold;
}
.glossary-bar .status { color: #6a6a5a; font-size: 12px; margin-left: 12px; }
.glossary-bar .name { color: #4a4a3a; font-size: 12px; font-weight: 500; }
.glossary-bar .actions { display: flex; gap: 10px; align-items: center; }
.btn-outline {
  background: none;
  border: 1px solid #b8b8aa;
  color: #6a5a4a;
  padding: 6px 14px;
  font-size: 11px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Times New Roman', serif;
  transition: border-color 0.2s;
}
.btn-outline:hover { border-color: #8a7a5a; }

/* Upload Zone */
.upload-zone {
  background: #fff;
  border: 2px dashed #b8b8aa;
  border-radius: 8px;
  padding: 48px 32px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.upload-zone:hover { border-color: #8a7a5a; }
.upload-zone.dragover { border-color: #8a7a5a; background: #fafaf8; }
.upload-zone .icon { color: #8a7a5a; font-size: 28px; font-weight: bold; margin-bottom: 12px; }
.upload-zone .main-text { color: #3a3a2e; font-size: 15px; margin-bottom: 6px; font-weight: 500; }
.upload-zone .sub-text { color: #7a7a6a; font-size: 12px; }
.upload-zone .btn-select {
  background: #8a7a5a;
  color: #fff;
  border: none;
  padding: 10px 28px;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 4px;
  margin-top: 16px;
  font-family: 'Times New Roman', serif;
  transition: background 0.2s;
}
.upload-zone .btn-select:hover { background: #7a6a4a; }

/* File list */
.file-list { margin-top: 14px; display: none; }
.file-list.visible { display: block; }
.file-list .summary { color: #5a5a4a; font-size: 12px; font-weight: 500; margin-bottom: 6px; }
.file-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: #fafaf8; border: 1px solid #e8e8e0;
  border-radius: 4px; margin-bottom: 4px;
}
.file-item .name { color: #3a3a2e; font-size: 13px; }
.file-item .remove {
  color: #b8b8aa; cursor: pointer; font-size: 16px; line-height: 1;
  padding: 0 4px; transition: color 0.2s;
}
.file-item .remove:hover { color: #8a5a4a; }

/* Translate Button */
.translate-btn-wrap { text-align: center; margin-bottom: 16px; }
.btn-translate {
  background: #8a7a5a;
  color: #fff;
  border: none;
  padding: 14px 52px;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(138,122,90,0.3);
  font-family: 'Times New Roman', serif;
  transition: background 0.2s;
}
.btn-translate:hover { background: #7a6a4a; }
.btn-translate:disabled { opacity: 0.5; cursor: not-allowed; }

/* Loading */
.loading { display: none; text-align: center; padding: 20px; color: #7a7a6a; font-size: 13px; }
.loading.visible { display: block; }
.loading .spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 2px solid #d0d0c8; border-top-color: #8a7a5a;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Results Section */
.results-section {
  background: #fff;
  border: 1px solid #d0d0c8;
  border-radius: 6px;
  padding: 22px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.results-section.hidden { display: none; }
.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 1px solid #e0e0d8;
  margin-bottom: 16px;
}
.results-header .title { color: #5a4a3a; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
.results-header .subtitle { color: #7a7a6a; font-size: 11px; }

.result-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  background: #f8f8f5;
  border-radius: 4px;
  border: 1px solid #d8d8d0;
  margin-bottom: 8px;
}
.result-item:last-child { margin-bottom: 0; }
.result-item .filename { color: #3a3a2e; font-size: 13px; font-weight: 500; }
.result-item .meta { color: #7a7a6a; font-size: 11px; margin-top: 2px; }
.result-item .actions { display: flex; gap: 8px; }
.btn-preview, .btn-download {
  background: none;
  border: 1px solid #b8b8aa;
  color: #6a5a4a;
  padding: 6px 12px;
  font-size: 11px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Times New Roman', serif;
  transition: border-color 0.2s;
}
.btn-preview:hover, .btn-download:hover { border-color: #8a7a5a; }

/* Revision Section */
.revision-section {
  margin-top: 18px;
  padding: 16px;
  background: #f8f8f5;
  border-radius: 4px;
  border: 1px solid #d8d8d0;
}
.revision-section .title { color: #5a4a3a; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; margin-bottom: 10px; }
.revision-section .hint { color: #6a6a5a; font-size: 12px; margin-bottom: 10px; }
.revision-section textarea {
  width: 100%;
  height: 60px;
  border: 1px solid #b8b8aa;
  border-radius: 4px;
  padding: 10px;
  font-size: 13px;
  font-family: 'Times New Roman', serif;
  resize: none;
  background: #fff;
  color: #3a3a2e;
  box-sizing: border-box;
}
.revision-section textarea:focus { outline: none; border-color: #8a7a5a; }
.revision-section .revision-actions { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
.btn-retranslate {
  background: #8a7a5a;
  color: #fff;
  border: none;
  padding: 8px 20px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 4px;
  font-family: 'Times New Roman', serif;
  transition: background 0.2s;
}
.btn-retranslate:hover { background: #7a6a4a; }
.revision-section .note { color: #8a8a7a; font-size: 11px; }

/* Hidden file input */
#file-input, #glossary-input { display: none; }

/* Status badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; }
.badge.success { background: #e8f0e0; color: #4a7a3a; }
.badge.error { background: #f0e0e0; color: #8a3a3a; }

/* Error toast */
.toast-error {
  background: #f0e0e0; color: #8a3a3a; border: 1px solid #d8b8b8;
  border-radius: 4px; padding: 10px 16px; margin-bottom: 16px;
  font-size: 12px; display: none;
}
.toast-error.visible { display: block; }
</style>
</head>
<body>
<div class="container">

  <!-- Error toast -->
  <div class="toast-error" id="toast-error"></div>

  <!-- Glossary Bar -->
  <div class="glossary-bar">
    <div style="display: flex; align-items: center;">
      <span class="label">术语表</span>
      <span class="status" id="glossary-status">未上传</span>
    </div>
    <div class="actions">
      <span class="name" id="glossary-name" style="display:none;"></span>
      <button class="btn-outline" id="btn-change-glossary" style="display:none;">更换</button>
      <button class="btn-outline" id="btn-upload-glossary">上传新术语表</button>
    </div>
  </div>

  <!-- Upload Zone -->
  <div class="upload-zone" id="upload-zone">
    <div class="icon">↑</div>
    <div class="main-text">拖拽 docx 文件到此处</div>
    <div class="sub-text">支持批量上传 .docx 文件</div>
    <button class="btn-select" id="btn-select-files">选择文件</button>
    <input type="file" id="file-input" accept=".docx" multiple>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- Translate Button -->
  <div class="translate-btn-wrap">
    <button class="btn-translate" id="btn-translate" disabled>开始翻译</button>
  </div>

  <!-- Loading indicator -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>翻译中，请稍候...</div>
  </div>

  <!-- Results Section -->
  <div class="results-section hidden" id="results-section">
    <div class="results-header">
      <span class="title">翻译结果</span>
      <span class="subtitle" id="results-count"></span>
    </div>
    <div id="results-list"></div>

    <!-- Revision Section -->
    <div class="revision-section">
      <div class="title">指出问题 / 要求修正</div>
      <div class="hint">描述需要修正的内容，系统将重新翻译或调整</div>
      <textarea id="feedback-text" placeholder="例如：第三段术语使用错误，应该是 XXX 而非 YYY"></textarea>
      <div class="revision-actions">
        <button class="btn-retranslate" id="btn-retranslate">重新翻译</button>
        <span class="note">指出问题后触发重新翻译</span>
      </div>
    </div>
  </div>

</div>

<script>
const API_BASE = '/api';

// State
let glossaryId = null;
let fileIds = [];
let currentJobId = null;
let uploadedFiles = [];

// Elements
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileListEl = document.getElementById('file-list');
const glossaryStatus = document.getElementById('glossary-status');
const glossaryName = document.getElementById('glossary-name');
const btnChangeGlossary = document.getElementById('btn-change-glossary');
const btnUploadGlossary = document.getElementById('btn-upload-glossary');
const resultsSection = document.getElementById('results-section');
const resultsList = document.getElementById('results-list');
const resultsCount = document.getElementById('results-count');
const loadingEl = document.getElementById('loading');
const feedbackText = document.getElementById('feedback-text');
const btnTranslate = document.getElementById('btn-translate');
const btnRetranslate = document.getElementById('btn-retranslate');
const toastError = document.getElementById('toast-error');

// ---------------------------------------------------------------------------
// Glossary
// ---------------------------------------------------------------------------
btnUploadGlossary.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,.xlsx';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch(`${API_BASE}/upload/glossary`, { method: 'POST', body: formData });
      if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Upload failed'); }
      const data = await res.json();
      glossaryId = data.glossary_id;
      glossaryStatus.textContent = `已就绪：${data.term_count} 条术语`;
      glossaryName.textContent = data.filename;
      glossaryName.style.display = 'inline';
      btnChangeGlossary.style.display = 'inline';
      btnUploadGlossary.textContent = '上传新术语表';
      hideError();
      enableTranslateIfReady();
    } catch (err) {
      showError('术语表上传失败：' + err.message);
    }
  };
  input.click();
});

btnChangeGlossary.addEventListener('click', () => {
  btnUploadGlossary.click();
});

// ---------------------------------------------------------------------------
// File upload
// ---------------------------------------------------------------------------
uploadZone.addEventListener('click', (e) => {
  if (e.target === uploadZone || e.target.closest('.upload-zone') && !e.target.closest('.btn-select')) {
    fileInput.click();
  }
});
fileInput.addEventListener('change', handleFileSelect);
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

async function handleFileSelect(e) {
  if (e.target.files.length) handleFiles(e.target.files);
}

async function handleFiles(files) {
  const validFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.docx'));
  if (!validFiles.length) {
    showError('请选择 .docx 文件');
    return;
  }

  const formData = new FormData();
  for (const f of validFiles) formData.append('files', f);

  try {
    const res = await fetch(`${API_BASE}/upload/files`, { method: 'POST', body: formData });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Upload failed'); }
    const data = await res.json();
    fileIds = data.file_ids;
    uploadedFiles = validFiles;
    renderFileList(validFiles);
    hideError();
    enableTranslateIfReady();
  } catch (err) {
    showError('文件上传失败：' + err.message);
  }
}

function renderFileList(files) {
  fileListEl.innerHTML = '<div class="summary">已选：' + files.length + ' 个文件待翻译</div>';
  fileListEl.classList.add('visible');
  Array.from(files).forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = '<span class="name">' + f.name + '</span>' +
      '<span class="remove" data-index="' + i + '">×</span>';
    div.querySelector('.remove').addEventListener('click', (e) => {
      e.stopPropagation();
      removeFile(i);
    });
    fileListEl.appendChild(div);
  });
}

function removeFile(index) {
  const newFiles = Array.from(uploadedFiles).filter((_, i) => i !== index);
  const newIds = fileIds.filter((_, i) => i !== index);
  if (newFiles.length === 0) {
    fileIds = [];
    uploadedFiles = [];
    fileListEl.classList.remove('visible');
    btnTranslate.disabled = !glossaryId;
    return;
  }
  uploadedFiles = newFiles;
  fileIds = newIds;
  renderFileList(newFiles);
  enableTranslateIfReady();
}

// ---------------------------------------------------------------------------
// Translate
// ---------------------------------------------------------------------------
btnTranslate.addEventListener('click', async () => {
  if (!glossaryId) { showError('请先上传术语表'); return; }
  if (!fileIds.length) { showError('请先上传要翻译的文件'); return; }

  btnTranslate.disabled = true;
  loadingEl.classList.add('visible');
  resultsSection.classList.add('hidden');
  hideError();

  try {
    const res = await fetch(`${API_BASE}/translate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_ids: fileIds, glossary_id: glossaryId })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Translation failed'); }
    const data = await res.json();
    currentJobId = data.job_id;
    pollStatus(currentJobId);
  } catch (err) {
    showError('翻译启动失败：' + err.message);
    loadingEl.classList.remove('visible');
    btnTranslate.disabled = false;
  }
});

async function pollStatus(jobId) {
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`${API_BASE}/status/${jobId}`);
      if (!res.ok) { clearInterval(interval); throw new Error('Status check failed'); }
      const data = await res.json();
      if (data.status === 'completed') {
        clearInterval(interval);
        showResults(data.results || []);
        loadingEl.classList.remove('visible');
        btnTranslate.disabled = false;
      } else if (data.status === 'failed') {
        clearInterval(interval);
        showError('翻译失败：' + (data.error || '未知错误'));
        loadingEl.classList.remove('visible');
        btnTranslate.disabled = false;
      }
    } catch (err) {
      clearInterval(interval);
      showError('状态检查失败：' + err.message);
      loadingEl.classList.remove('visible');
      btnTranslate.disabled = false;
    }
  }, 2000);
}

function showResults(results) {
  resultsSection.classList.remove('hidden');
  resultsList.innerHTML = '';
  const completed = results.filter(r => r.status === 'completed');
  resultsCount.textContent = completed.length + '/' + results.length + ' 个文件 · 翻译完成';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    const isOk = r.status === 'completed';
    div.innerHTML = '<div>' +
      '<div class="filename">' + uploadedFiles[i]?.name || ('file_' + r.file_id) + '</div>' +
      '<div class="meta">' +
        (isOk ? '<span class="badge success">完成</span>' : '<span class="badge error">失败</span>') +
        (r.error ? ' ' + r.error : '') +
      '</div></div>' +
      (isOk ? '<div class="actions"><button class="btn-download" data-job="' + currentJobId + '">下载</button></div>' : '');
    if (isOk) {
      div.querySelector('.btn-download').addEventListener('click', () => {
        downloadResult(currentJobId);
      });
    }
    resultsList.appendChild(div);
  });
}

function downloadResult(jobId) {
  window.open(`${API_BASE}/result/${jobId}`, '_blank');
}

// ---------------------------------------------------------------------------
// Re-translate
// ---------------------------------------------------------------------------
btnRetranslate.addEventListener('click', async () => {
  if (!currentJobId) return;
  const feedback = feedbackText.value.trim();
  if (!feedback) { showError('请先描述需要修正的问题'); return; }

  btnRetranslate.disabled = true;
  loadingEl.classList.add('visible');
  hideError();

  try {
    const res = await fetch(`${API_BASE}/revise`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: currentJobId, feedback })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Revision failed'); }
    const data = await res.json();
    currentJobId = data.job_id;

    // Poll new job
    const interval = setInterval(async () => {
      try {
        const r = await fetch(`${API_BASE}/status/${currentJobId}`);
        const d = await r.json();
        if (d.status === 'completed') {
          clearInterval(interval);
          showResults(d.results || []);
          loadingEl.classList.remove('visible');
          btnRetranslate.disabled = false;
        } else if (d.status === 'failed') {
          clearInterval(interval);
          showError('重新翻译失败：' + (d.error || '未知错误'));
          loadingEl.classList.remove('visible');
          btnRetranslate.disabled = false;
        }
      } catch (err) {
        clearInterval(interval);
        showError('状态检查失败');
        loadingEl.classList.remove('visible');
        btnRetranslate.disabled = false;
      }
    }, 2000);
  } catch (err) {
    showError('重新翻译启动失败：' + err.message);
    loadingEl.classList.remove('visible');
    btnRetranslate.disabled = false;
  }
});

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function enableTranslateIfReady() {
  btnTranslate.disabled = !(glossaryId && fileIds.length);
}

function showError(msg) {
  toastError.textContent = msg;
  toastError.classList.add('visible');
}

function hideError() {
  toastError.classList.remove('visible');
}
</script>
</body>
</html>
