<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immigration Translation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500;1,700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f0eb;
  --surface: #fdfcf9;
  --surface-hover: #faf8f4;
  --gold: #9a8664;
  --gold-light: #c4b698;
  --gold-dark: #7a6a4e;
  --gold-glow: rgba(154, 134, 100, 0.3);
  --border: #d6d2c8;
  --border-light: #e5e2d8;
  --text-primary: #2c2c24;
  --text-secondary: #6b685e;
  --text-tertiary: #918e82;
  --text-on-gold: #fcfaf6;
  --error-bg: #f0e8e6;
  --error-text: #8a4a3e;
  --success-bg: #e8ede2;
  --success-text: #4a6a3a;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background:
    repeating-linear-gradient(
      45deg,
      transparent 0px,
      transparent 39px,
      rgba(154, 134, 100, 0.08) 39px,
      rgba(154, 134, 100, 0.08) 40px,
      transparent 40px,
      transparent 79px
    ),
    repeating-linear-gradient(
      -45deg,
      transparent 0px,
      transparent 39px,
      rgba(154, 134, 100, 0.08) 39px,
      rgba(154, 134, 100, 0.08) 40px,
      transparent 40px,
      transparent 79px
    ),
    var(--bg);
  font-family: 'Source Serif 4', 'Georgia', serif;
  font-variant-numeric: lining-nums tabular-nums;
  color: var(--text-primary);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.3;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 0;
}

/* Warm vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, transparent 30%, rgba(44,44,36,0.04) 100%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 24px 72px;
  position: relative;
  z-index: 1;
}

/* ========== HEADER ========== */
.app-header {
  text-align: center;
  margin-bottom: 44px;
  animation: fadeSlideDown 0.7s ease both;
}
.app-header .title-en {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 42px;
  letter-spacing: 1.2px;
  color: var(--text-primary);
  line-height: 1.1;
  font-style: italic;
}
.app-header .title-en .gold {
  color: var(--gold);
  font-weight: 700;
  font-style: normal;
}
.app-header .title-cn {
  font-family: 'Source Serif 4', 'Georgia', serif;
  font-size: 16px;
  color: var(--text-tertiary);
  letter-spacing: 6px;
  margin-top: 8px;
  font-weight: 400;
  text-transform: uppercase;
}
.app-header .divider-line {
  width: auto;
  height: 12px;
  margin: 14px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.app-header .divider-line::before,
.app-header .divider-line::after {
  content: '';
  display: block;
  width: 28px;
  height: 1px;
  background: var(--gold-light);
}
.app-header .divider-line .diamond {
  display: block;
  width: 5px;
  height: 5px;
  border: 1px solid var(--gold-light);
  transform: rotate(45deg);
}

/* ========== CARD ========== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 12px rgba(44,44,36,0.05);
  transition: box-shadow var(--transition);
}

/* ========== GLOSSARY BAR ========== */
.glossary-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  margin-bottom: 16px;
  animation: fadeSlideUp 0.5s ease both 0.1s;
}
.glossary-bar .label-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.glossary-bar .label {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold-dark);
}
.glossary-bar .label::before {
  content: '—';
  margin-right: 6px;
  color: var(--gold-light);
}
.glossary-bar .status {
  font-size: 14px;
  color: var(--text-tertiary);
}
.glossary-bar .name {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.glossary-bar .actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

/* ========== BUTTONS ========== */
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 7px 18px;
  font-size: 13px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: 'Source Serif 4', serif;
  transition: all var(--transition);
  letter-spacing: 0.5px;
}
.btn-ghost:hover {
  border-color: var(--gold);
  color: var(--gold-dark);
  background: var(--surface-hover);
  box-shadow: 0 0 0 3px var(--gold-glow);
}

/* ========== CUSTOM API SECTION ========== */
.api-settings {
  margin-bottom: 16px;
  animation: fadeSlideUp 0.5s ease both 0.15s;
}
.api-settings .api-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
.api-settings .api-toggle:hover { color: var(--gold-dark); }
.api-settings .api-toggle .arrow {
  display: inline-block;
  transition: transform 0.3s ease;
  font-size: 10px;
}
.api-settings .api-toggle.open .arrow { transform: rotate(90deg); }
.api-settings .api-body {
  display: none;
  padding: 0 22px 18px;
  flex-direction: column;
  gap: 12px;
}
.api-settings .api-body.open { display: flex; }
.api-settings .api-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.api-settings .api-field label {
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.api-settings .api-field input {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 14px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.api-settings .api-field input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px var(--gold-glow);
}
.api-settings .api-field input::placeholder {
  color: var(--text-tertiary);
  font-size: 13px;
}

.api-settings .api-status {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-tertiary);
}
.api-settings .api-status.confirmed {
  color: var(--success-text);
}
.api-settings .api-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.api-settings .btn-api-test {
  flex: 1;
}
.api-settings .btn-api-confirm {
  flex: 1;
  background: var(--gold);
  color: var(--text-on-gold);
  border-color: var(--gold);
}
.api-settings .btn-api-confirm:hover {
  background: var(--gold-dark);
  border-color: var(--gold-dark);
  color: var(--text-on-gold);
}
.api-settings .api-test-result {
  margin-top: 8px;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  display: none;
}
.api-settings .api-test-result.success {
  display: block;
  background: var(--success-bg);
  color: var(--success-text);
}
.api-settings .api-test-result.error {
  display: block;
  background: var(--error-bg);
  color: var(--error-text);
}
.api-settings .api-field input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ========== UPLOAD ZONE ========== */
.upload-zone {
  padding: 64px 32px 48px;
  text-align: center;
  margin-bottom: 24px;
  cursor: pointer;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  transition: all var(--transition);
  animation: fadeSlideUp 0.5s ease both 0.15s;
  position: relative;
}
.upload-zone:hover {
  border-color: var(--gold-light);
  background: var(--surface-hover);
  box-shadow: 0 8px 32px rgba(44,44,36,0.06);
}
.upload-zone.dragover {
  border-color: var(--gold);
  background: var(--surface-hover);
  box-shadow: 0 0 0 5px var(--gold-glow), 0 8px 32px rgba(44,44,36,0.08);
  transform: scale(1.015);
}
.upload-zone .icon-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(145deg, var(--gold-light), var(--gold));
  color: var(--text-on-gold);
  font-size: 30px;
  margin-bottom: 20px;
  box-shadow: 0 6px 24px var(--gold-glow);
  transition: transform var(--transition), box-shadow var(--transition);
}
.upload-zone:hover .icon-wrap {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 32px var(--gold-glow);
}
.upload-zone .main-text {
  color: var(--text-primary);
  font-size: 18px;
  font-weight: 500;
  font-family: 'Source Serif 4', serif;
  margin-bottom: 6px;
}
.upload-zone .sub-text {
  color: var(--text-tertiary);
  font-size: 14px;
}

/* ========== FILE LIST ========== */
.file-list {
  margin-top: 20px;
  display: none;
  text-align: left;
}
.file-list.visible { display: block; animation: fadeSlideUp 0.35s ease both; }
.file-list .summary {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.file-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  margin-bottom: 5px;
  transition: all var(--transition);
}
.file-item:hover {
  border-color: var(--gold-light);
  background: var(--surface-hover);
}
.file-item .name {
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
}
.file-item .remove {
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 6px;
  transition: color var(--transition);
}
.file-item .remove:hover { color: var(--error-text); }

/* ========== TRANSLATE BUTTON ========== */
.translate-wrap {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeSlideUp 0.5s ease both 0.25s;
}
.btn-translate {
  position: relative;
  background: linear-gradient(145deg, var(--gold), var(--gold-dark));
  color: var(--text-on-gold);
  border: none;
  padding: 18px 60px;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 50px;
  font-family: 'Playfair Display', serif;
  transition: all var(--transition);
  text-transform: uppercase;
  box-shadow: 0 6px 28px var(--gold-glow);
  overflow: hidden;
}
.btn-translate::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  transition: transform var(--transition);
  transform: translateX(-100%) skewX(-15deg);
}
.btn-translate:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 10px 40px var(--gold-glow);
  background: linear-gradient(145deg, var(--gold-light), var(--gold));
}
.btn-translate:hover::before {
  transform: translateX(100%) skewX(-15deg);
}
.btn-translate:active {
  transform: translateY(0) scale(1);
  box-shadow: 0 4px 16px var(--gold-glow);
}
.btn-translate:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
.btn-translate:disabled::before { display: none; }

/* =============================================================
   PROGRESS SECTION — "Translation Studio" aesthetic
   ============================================================= */
.progress-section {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 12px rgba(44,44,36,0.05);
  padding: 28px 28px 24px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.progress-section.visible {
  display: block;
  animation: fadeSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}
/* Subtle ornamental top accent */
.progress-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 28px;
  right: 28px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
}

/* --- metrics row: ring + overview --- */
.progress-metrics {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-light);
}
.progress-ring-wrap {
  position: relative;
  width: 72px;
  height: 72px;
  flex-shrink: 0;
}
.progress-ring-wrap svg {
  display: block;
}
.progress-ring-bg {
  fill: none;
  stroke: var(--border-light);
  stroke-width: 4;
}
.progress-ring-fill {
  fill: none;
  stroke: var(--gold);
  stroke-width: 4.5;
  stroke-linecap: round;
  stroke-dasharray: 201;
  stroke-dashoffset: 201;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}
.progress-pct {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--gold-dark);
  letter-spacing: -0.5px;
}
.progress-overview {
  flex: 1;
  min-width: 0;
}
.progress-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--text-primary);
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.progress-detail {
  font-size: 13px;
  color: var(--text-tertiary);
}

/* --- file list in progress --- */
.progress-files {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 4px;
}
.progress-file {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 400;
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.progress-file.pf-pending {
  color: var(--text-tertiary);
  opacity: 0.6;
}
.progress-file.pf-active {
  color: var(--text-primary);
  background: rgba(154, 134, 100, 0.07);
}
.progress-file.pf-done {
  color: var(--text-secondary);
}
.progress-file .pf-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  transition: all 0.5s ease;
  position: relative;
}
/* pending: empty circle */
.progress-file.pf-pending .pf-icon { border-color: var(--border); }
/* active: pulsing dot */
.progress-file.pf-active .pf-icon {
  border-color: var(--gold);
  animation: pfPulse 1.6s ease-in-out infinite;
}
.progress-file.pf-active .pf-icon::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold);
  animation: pfBlip 1.6s ease-in-out infinite;
}
/* done: checkmark */
.progress-file.pf-done .pf-icon {
  border-color: var(--success-text);
  background: var(--success-bg);
}
.progress-file.pf-done .pf-icon::after {
  content: '';
  width: 5px;
  height: 9px;
  border: solid var(--success-text);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}
.progress-file .pf-name {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.progress-file .pf-name .ext {
  color: var(--text-tertiary);
}
@keyframes pfPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(154, 134, 100, 0.3); }
  50% { box-shadow: 0 0 0 7px rgba(154, 134, 100, 0); }
}
@keyframes pfBlip {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* --- status bar at bottom --- */
.progress-status-bar {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.progress-status-bar .status-msg {
  color: var(--text-tertiary);
  transition: opacity 0.3s ease;
  flex: 1;
}
.progress-status-bar .status-msg .highlight {
  color: var(--gold-dark);
  font-style: normal;
  font-weight: 500;
}
.progress-status-bar .status-percent {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--gold-dark);
  letter-spacing: -0.5px;
  margin-left: 12px;
  flex-shrink: 0;
}
@keyframes dots {
  0%, 20% { opacity: 0; }
  40% { opacity: 1; }
  60%, 100% { opacity: 0; }
}
.progress-status-bar .status-msg .dot-anim {
  display: inline-block;
  animation: dots 1.4s ease infinite;
}
.progress-status-bar .status-msg .dot-anim:nth-child(2) { animation-delay: 0.2s; }
.progress-status-bar .status-msg .dot-anim:nth-child(3) { animation-delay: 0.4s; }

/* ========== RESULTS ========== */
.results-section {
  padding: 26px;
  animation: fadeSlideUp 0.5s ease both;
}
.results-section.hidden { display: none; }
.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 18px;
}
.results-header .title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold-dark);
}
.results-header .title::before {
  content: '◆ ';
  font-size: 11px;
}
.results-header .subtitle {
  font-size: 13px;
  color: var(--text-tertiary);
}

.result-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all var(--transition);
  animation: fadeSlideUp 0.4s ease both;
}
.result-item:hover {
  border-color: var(--gold-light);
  box-shadow: 0 2px 12px rgba(44,44,36,0.05);
}
.result-item .info {
  flex: 1;
  min-width: 0;
}
.result-item .filename {
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
}
.result-item .meta {
  font-size: 13px;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-item .actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-success { background: var(--success-bg); color: var(--success-text); }
.badge-error { background: var(--error-bg); color: var(--error-text); }

.btn-download {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 7px 18px;
  font-size: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: 'Source Serif 4', serif;
  transition: all var(--transition);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.btn-download:hover {
  border-color: var(--gold);
  color: var(--gold-dark);
  background: var(--surface-hover);
  box-shadow: 0 0 0 3px var(--gold-glow);
}

/* ========== REVISION ========== */
.revision-section {
  margin-top: 22px;
  padding: 22px;
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.revision-section:focus-within {
  border-color: var(--gold-light);
  box-shadow: 0 0 0 4px var(--gold-glow);
}
.revision-section .title {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold-dark);
  margin-bottom: 6px;
}
.revision-section .hint {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: 14px;
}
.revision-section textarea {
  width: 100%;
  height: 80px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 14px;
  font-family: 'Source Serif 4', 'Georgia', serif;
  resize: vertical;
  background: var(--surface);
  color: var(--text-primary);
  box-sizing: border-box;
  transition: border-color var(--transition), box-shadow var(--transition);
  line-height: 1.6;
}
.revision-section textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 4px var(--gold-glow);
}
.revision-section textarea::placeholder {
  color: var(--text-tertiary);
}
.revision-section .revision-actions {
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
}
.revision-section .note {
  color: var(--text-tertiary);
  font-size: 12px;
}

.btn-retranslate {
  background: var(--gold);
  color: var(--text-on-gold);
  border: none;
  padding: 10px 28px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  cursor: pointer;
  border-radius: 50px;
  font-family: 'Source Serif 4', serif;
  transition: all var(--transition);
  text-transform: uppercase;
  box-shadow: 0 3px 12px var(--gold-glow);
}
.btn-retranslate:hover {
  background: var(--gold-dark);
  box-shadow: 0 6px 24px var(--gold-glow);
  transform: translateY(-1px);
}

/* ========== ERROR TOAST ========== */
.toast-error {
  display: none;
  background: var(--error-bg);
  color: var(--error-text);
  border: 1px solid #dcc8c4;
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.5;
  animation: fadeSlideUp 0.3s ease both;
}
.toast-error.visible { display: block; }
.toast-error::before { content: '⚠ '; }

#file-input { display: none; }

/* ========== ANIMATIONS ========== */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.result-item:nth-child(1) { animation-delay: 0.05s; }
.result-item:nth-child(2) { animation-delay: 0.1s; }
.result-item:nth-child(3) { animation-delay: 0.15s; }
.result-item:nth-child(4) { animation-delay: 0.2s; }
.result-item:nth-child(5) { animation-delay: 0.25s; }

/* ========== STATUS CHECK ICON ========== */
.status-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.status-icon .check-bg {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: var(--success-bg);
  transform: scale(0);
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.status-icon.checked { border-color: var(--success-text); }
.status-icon.checked .check-bg { transform: scale(1); }
.status-icon svg {
  width: 18px;
  height: 18px;
  position: relative;
  z-index: 1;
}
.status-icon .check-path {
  fill: none;
  stroke: var(--success-text);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 30;
  stroke-dashoffset: 30;
  transition: stroke-dashoffset 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
}
.status-icon.checked .check-path { stroke-dashoffset: 0; }

/* Revision indicator badge on result items */
.revision-badge {
  display: inline-block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold-dark);
  background: rgba(154, 134, 100, 0.12);
  padding: 2px 10px;
  border-radius: 4px;
  font-weight: 600;
  margin-left: 6px;
}

/* ========== PREVIEW MODAL ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44, 44, 36, 0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.25s ease both;
}
.modal-overlay.visible { display: flex; }
.modal-content {
  background: var(--surface);
  border-radius: var(--radius);
  max-width: 720px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 64px rgba(44, 44, 36, 0.2);
  border: 1px solid var(--border);
  animation: fadeSlideUp 0.3s ease both;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.modal-header .title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--gold-dark);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.modal-header .title::before {
  content: '◆ ';
  font-size: 11px;
}
.modal-close {
  background: none;
  border: none;
  font-size: 22px;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 4px;
  transition: all var(--transition);
  line-height: 1;
}
.modal-close:hover {
  color: var(--text-primary);
  background: var(--bg);
}
.modal-body {
  padding: 24px;
  overflow-y: auto;
  font-family: 'Source Serif 4', 'Georgia', serif;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-primary);
}
.preview-para {
  margin-bottom: 10px;
}
.preview-para.preview-empty {
  height: 0.8em;
}
.modal-body .file-header {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}
.modal-body .file-header:not(:first-child) {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--border-light);
}

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .container { padding: 32px 16px 48px; }
  .app-header .title-en { font-size: 28px; }
  .glossary-bar { flex-direction: column; gap: 10px; align-items: flex-start; }
  .glossary-bar .actions { width: 100%; justify-content: flex-end; }
  .upload-zone { padding: 44px 20px 36px; }
  .btn-translate { padding: 14px 40px; font-size: 15px; }
  .results-section { padding: 20px; }
  .result-item { flex-direction: column; align-items: flex-start; gap: 8px; }
  .result-item .actions { align-self: flex-end; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-light); }

::selection { background: var(--gold-light); color: var(--text-primary); }
</style>
</head>
<body>
<div class="container">

  <!-- Header: Large artistic title -->
  <header class="app-header">
    <div class="title-en">
      <span class="gold">Immigration</span><br>
      Translation
    </div>
    <div class="title-cn">文件翻译工作台</div>
    <div class="divider-line"><span class="diamond"></span></div>
  </header>

  <!-- Error toast -->
  <div class="toast-error" id="toast-error"></div>

  <!-- Glossary Bar -->
  <div class="glossary-bar card" id="glossary-bar">
    <div class="label-group">
      <span class="label">术语表</span>
      <span class="status" id="glossary-status">未上传</span>
    </div>
    <div class="actions">
      <span class="name" id="glossary-name" style="display:none;"></span>
      <button class="btn-ghost" id="btn-change-glossary" style="display:none;">更换</button>
      <button class="btn-ghost" id="btn-upload-glossary">上传术语表</button>
    </div>
  </div>

  <!-- Custom API Settings -->
  <div class="api-settings card" id="api-settings">
    <div class="api-toggle" id="api-toggle">
      <span class="arrow">▶</span>
      <span>自定义 API（可选）</span>
      <span class="api-status" id="api-status"></span>
    </div>
    <div class="api-body" id="api-body">
      <div class="api-field">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="api-field">
        <label>接口地址</label>
        <input type="text" id="api-base-url" value="https://api.deepseek.com" placeholder="https://api.deepseek.com">
      </div>
      <div class="api-field">
        <label>模型名称</label>
        <input type="text" id="api-model" value="deepseek-v4-flash" placeholder="deepseek-v4-flash">
      </div>
      <div class="api-actions">
        <button class="btn-ghost btn-api-test" id="btn-api-test">测试连接</button>
        <button class="btn-ghost btn-api-confirm" id="btn-api-confirm">确认</button>
      </div>
      <div class="api-test-result" id="api-test-result"></div>
    </div>
  </div>

  <!-- Upload Zone (click anywhere inside to upload — no separate button) -->
  <div class="upload-zone card" id="upload-zone">
    <div class="icon-wrap">↑</div>
    <div class="main-text">拖拽 .docx 到此处，或点击添加文件</div>
    <p class="sub-text">支持批量上传，每份文档独立翻译</p>
    <input type="file" id="file-input" accept=".docx" multiple>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- Translate Button — pill-shaped, dramatic -->
  <div class="translate-wrap">
    <button class="btn-translate" id="btn-translate" disabled>开始翻译</button>
  </div>

  <!-- Progress Section -->
  <div class="progress-section" id="progress-section">
    <div class="progress-metrics">
      <div class="progress-ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="progress-ring-bg" cx="36" cy="36" r="32"/>
          <circle class="progress-ring-fill" cx="36" cy="36" r="32" id="progress-ring"/>
        </svg>
        <div class="progress-pct" id="progress-pct">0%</div>
      </div>
      <div class="progress-overview">
        <div class="progress-title" id="progress-title">翻译处理中</div>
        <div class="progress-detail" id="progress-detail">正在准备...</div>
      </div>
    </div>
    <div class="progress-files" id="progress-files"></div>
    <div class="progress-status-bar">
      <span class="status-msg" id="progress-msg">正在启动<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span></span>
      <span class="status-percent" id="progress-percent">0%</span>
    </div>
  </div>

  <!-- Results Section -->
  <div class="results-section card hidden" id="results-section">
    <div class="results-header">
      <span class="title">翻译结果</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="btn-download" id="btn-download-all" style="display:none;">下载全部</button>
        <span class="subtitle" id="results-count"></span>
      </div>
    </div>
    <div id="results-list"></div>

    <!-- Revision Section -->
    <div class="revision-section">
      <div class="title">指出问题 · 要求修正</div>
      <p class="hint">描述需要修正的内容，系统将在上下文中重新翻译</p>
      <textarea id="feedback-text" placeholder="例如：第三段术语使用错误，应使用 XXX 而非 YYY"></textarea>
      <div class="revision-actions">
        <span class="note">提交反馈后自动重新翻译</span>
        <button class="btn-retranslate" id="btn-retranslate">重新翻译</button>
      </div>
    </div>
  </div>

</div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <span class="title">翻译预览</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

<script>
const API_BASE = '/api';

let glossaryId = null;
let fileIds = [];
let currentJobId = null;
let uploadedFiles = [];

// ---------------------------------------------------------------------------
// Custom API — confirm + test
// ---------------------------------------------------------------------------
let confirmedApi = null;

const apiToggle = document.getElementById('api-toggle');
const apiBody = document.getElementById('api-body');
apiToggle.addEventListener('click', (e) => {
  // Don't toggle when clicking the status badge
  if (e.target.closest('.api-status')) return;
  apiToggle.classList.toggle('open');
  apiBody.classList.toggle('open');
});

const apiKeyInput = document.getElementById('api-key');
const apiBaseInput = document.getElementById('api-base-url');
const apiModelInput = document.getElementById('api-model');
const apiStatus = document.getElementById('api-status');
const apiTestResult = document.getElementById('api-test-result');
const btnApiTest = document.getElementById('btn-api-test');
const btnApiConfirm = document.getElementById('btn-api-confirm');

// Reset confirmation when any field changes
[apiKeyInput, apiBaseInput, apiModelInput].forEach(el => {
  el.addEventListener('input', () => {
    confirmedApi = null;
    apiStatus.textContent = '';
    apiStatus.className = 'api-status';
    [apiKeyInput, apiBaseInput, apiModelInput].forEach(i => i.disabled = false);
  });
});

function getCustomAPI() {
  return confirmedApi;
}

function readApiForm() {
  const key = apiKeyInput.value.trim();
  if (!key) return null;
  return {
    api_key: key,
    base_url: apiBaseInput.value.trim() || 'https://api.deepseek.com',
    model: apiModelInput.value.trim() || 'deepseek-v4-flash',
  };
}

// Confirm button
btnApiConfirm.addEventListener('click', () => {
  const cfg = readApiForm();
  if (!cfg) {
    apiStatus.textContent = '请输入 API Key';
    apiStatus.className = 'api-status';
    return;
  }
  confirmedApi = cfg;
  apiStatus.textContent = '✓ 已确认';
  apiStatus.className = 'api-status confirmed';
  [apiKeyInput, apiBaseInput, apiModelInput].forEach(i => i.disabled = true);
});

// Test connection button
btnApiTest.addEventListener('click', async () => {
  const cfg = readApiForm();
  if (!cfg) {
    apiTestResult.textContent = '请先填写 API Key';
    apiTestResult.className = 'api-test-result error';
    return;
  }
  btnApiTest.disabled = true;
  btnApiTest.textContent = '测试中...';
  apiTestResult.className = 'api-test-result';
  try {
    const res = await fetch(`${API_BASE}/test-api`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      apiTestResult.textContent = '✓ ' + data.message;
      apiTestResult.className = 'api-test-result success';
    } else {
      apiTestResult.textContent = '✗ ' + (data.message || '连接失败');
      apiTestResult.className = 'api-test-result error';
    }
  } catch (err) {
    apiTestResult.textContent = '✗ 网络错误：' + err.message;
    apiTestResult.className = 'api-test-result error';
  } finally {
    btnApiTest.disabled = false;
    btnApiTest.textContent = '测试连接';
  }
});

const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileListEl = document.getElementById('file-list');
const glossaryStatus = document.getElementById('glossary-status');
const glossaryName = document.getElementById('glossary-name');
const btnChangeGlossary = document.getElementById('btn-change-glossary');
const btnUploadGlossary = document.getElementById('btn-upload-glossary');
const resultsSection = document.getElementById('results-section');
const resultsList = document.getElementById('results-list');
const resultsCount = document.getElementById('results-count');
const progressSection = document.getElementById('progress-section');
const progressRing = document.getElementById('progress-ring');
const progressPct = document.getElementById('progress-pct');
const progressTitle = document.getElementById('progress-title');
const progressDetail = document.getElementById('progress-detail');
const progressFiles = document.getElementById('progress-files');
const progressMsg = document.getElementById('progress-msg');
const progressPercent = document.getElementById('progress-percent');
const feedbackText = document.getElementById('feedback-text');
const btnTranslate = document.getElementById('btn-translate');
const btnRetranslate = document.getElementById('btn-retranslate');
const btnDownloadAll = document.getElementById('btn-download-all');
const toastError = document.getElementById('toast-error');

// ---------------------------------------------------------------------------
// Glossary
// ---------------------------------------------------------------------------
btnUploadGlossary.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,.xlsx';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch(`${API_BASE}/upload/glossary`, { method: 'POST', body: formData });
      if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '上传失败'); }
      const data = await res.json();
      glossaryId = data.glossary_id;
      glossaryStatus.textContent = `已就绪：${data.term_count} 条术语`;
      glossaryName.textContent = data.filename;
      glossaryName.style.display = 'inline';
      btnChangeGlossary.style.display = 'inline';
      btnUploadGlossary.textContent = '上传新术语表';
      hideError();
      enableTranslateIfReady();
    } catch (err) {
      showError('术语表上传失败：' + err.message);
    }
  };
  input.click();
});

btnChangeGlossary.addEventListener('click', () => { btnUploadGlossary.click(); });

// ---------------------------------------------------------------------------
// File upload — click anywhere on zone
// ---------------------------------------------------------------------------
uploadZone.addEventListener('click', () => { fileInput.click(); });
fileInput.addEventListener('change', handleFileSelect);

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('dragover');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

async function handleFileSelect(e) {
  if (e.target.files.length) handleFiles(e.target.files);
}

async function handleFiles(files) {
  const validFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.docx'));
  if (!validFiles.length) {
    showError('请选择 .docx 格式的文件');
    return;
  }
  const formData = new FormData();
  for (const f of validFiles) formData.append('files', f);
  try {
    const res = await fetch(`${API_BASE}/upload/files`, { method: 'POST', body: formData });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '上传失败'); }
    const data = await res.json();
    fileIds = data.file_ids;
    uploadedFiles = validFiles;
    renderFileList(validFiles);
    hideError();
    enableTranslateIfReady();
  } catch (err) {
    showError('文件上传失败：' + err.message);
  }
}

function renderFileList(files) {
  fileListEl.innerHTML = '';
  const summary = document.createElement('div');
  summary.className = 'summary';
  summary.textContent = `已选 ${files.length} 个文件待翻译`;
  fileListEl.appendChild(summary);
  fileListEl.classList.add('visible');
  Array.from(files).forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.style.animationDelay = (i * 0.06) + 's';
    div.innerHTML = '<span class="name">' + f.name + '</span>' +
      '<span class="remove" data-index="' + i + '">✕</span>';
    div.querySelector('.remove').addEventListener('click', (e) => {
      e.stopPropagation();
      removeFile(i);
    });
    fileListEl.appendChild(div);
  });
}

function removeFile(index) {
  const newFiles = Array.from(uploadedFiles).filter((_, i) => i !== index);
  const newIds = fileIds.filter((_, i) => i !== index);
  if (newFiles.length === 0) {
    fileIds = [];
    uploadedFiles = [];
    fileListEl.classList.remove('visible');
    btnTranslate.disabled = !glossaryId;
    return;
  }
  uploadedFiles = newFiles;
  fileIds = newIds;
  renderFileList(newFiles);
  enableTranslateIfReady();
}

// ---------------------------------------------------------------------------
// Translate
// ---------------------------------------------------------------------------
btnTranslate.addEventListener('click', async () => {
  if (!glossaryId) { showError('请先上传术语表'); return; }
  if (!fileIds.length) { showError('请先上传要翻译的文件'); return; }

  btnTranslate.disabled = true;
  progressSection.classList.add('visible');
  resultsSection.classList.add('hidden');
  renderProgressInit();
  hideError();

  try {
    const bodyData = { file_ids: fileIds, glossary_id: glossaryId };
    const customApi = getCustomAPI();
    if (customApi) bodyData.custom_api = customApi;
    const res = await fetch(`${API_BASE}/translate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(bodyData)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '翻译启动失败'); }
    const data = await res.json();
    currentJobId = data.job_id;
    pollStatus(currentJobId);
  } catch (err) {
    showError('翻译启动失败：' + err.message);
    progressSection.classList.remove('visible');
    btnTranslate.disabled = false;
  }
});

// ---------------------------------------------------------------------------
// Progress display
// ---------------------------------------------------------------------------
const RING_CIRCUMFERENCE = 201;

function renderProgressInit() {
  // Show file list skeleton — all pending
  progressFiles.innerHTML = '';
  uploadedFiles.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'progress-file pf-pending';
    div.style.animationDelay = (i * 0.06) + 's';
    div.innerHTML = '<div class="pf-icon"></div><span class="pf-name">' + escapeHtml(f.name) + '</span>';
    div.dataset.index = i;
    progressFiles.appendChild(div);
  });
  updateProgressRing(0);
  progressPct.textContent = '0%';
  progressPercent.textContent = '0%';
  progressTitle.textContent = '翻译处理中';
  progressDetail.textContent = '连接 AI 服务...';
  progressMsg.innerHTML = '正在启动<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>';
}

function updateProgressRing(pct) {
  const offset = RING_CIRCUMFERENCE - (RING_CIRCUMFERENCE * pct / 100);
  progressRing.style.strokeDashoffset = offset;
}

function renderProgress(prog) {
  // Update ring & percentages
  const total = prog.total || 1;
  const done = prog.completed || 0;
  const fullDone = Math.floor(done);
  const pct = Math.min(100, Math.round((done / total) * 100));
  updateProgressRing(pct);
  progressPct.textContent = pct + '%';
  progressPercent.textContent = pct + '%';

  // Update file items
  const items = progressFiles.querySelectorAll('.progress-file');
  let activeName = '';
  items.forEach((item, i) => {
    item.className = 'progress-file';
    if (i < fullDone) {
      item.classList.add('pf-done');
    } else if (i === fullDone && prog.stage !== 'done') {
      item.classList.add('pf-active');
      activeName = item.querySelector('.pf-name').textContent;
    } else {
      item.classList.add('pf-pending');
    }
  });

  // Update title & detail & status bar
  if (prog.stage === 'starting') {
    progressTitle.textContent = '准备就绪';
    progressDetail.textContent = '即将开始翻译...';
    progressMsg.innerHTML = '正在准备文件<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>';
  } else if (prog.stage === 'translating') {
    progressTitle.textContent = '翻译处理中';
    if (prog.detail) {
      progressMsg.innerHTML = '<span class="highlight">' + escapeHtml(prog.detail) + '</span><span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>';
    } else if (prog.current_file) {
      progressMsg.innerHTML = '<span class="highlight">' + escapeHtml(prog.current_file) + '</span> 翻译中<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>';
    } else {
      progressMsg.innerHTML = '正在翻译<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>';
    }
    // Show file count detail
    if (total > 1) {
      progressDetail.textContent = '正在处理 ' + (fullDone + 1) + '/' + total + ' 个文件';
    } else {
      progressDetail.textContent = '进度 ' + pct + '%';
    }
  } else if (prog.stage === 'done') {
    progressTitle.textContent = '处理完成';
    progressDetail.textContent = '全部 ' + total + ' 个文件翻译完毕';
    progressMsg.textContent = '合并结果中...';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function pollStatus(jobId) {
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`${API_BASE}/status/${jobId}`);
      if (!res.ok) { clearInterval(interval); throw new Error('状态检查失败'); }
      const data = await res.json();
      if (data.status === 'completed') {
        clearInterval(interval);
        // Quick 100% celebration then show results
        updateProgressRing(100);
        progressPct.textContent = '100%';
        progressPercent.textContent = '100%';
        progressTitle.textContent = '处理完成';
        progressDetail.textContent = '正在加载结果...';
        progressMsg.textContent = '翻译已完成';
        // Show done state on all file items
        progressFiles.querySelectorAll('.progress-file').forEach(el => {
          el.className = 'progress-file pf-done';
        });
        setTimeout(() => {
          progressSection.classList.remove('visible');
          showResults(data.results || []);
        }, 600);
        btnTranslate.disabled = false;
      } else if (data.status === 'failed') {
        clearInterval(interval);
        showError('翻译失败：' + (data.error || '未知错误'));
        progressSection.classList.remove('visible');
        btnTranslate.disabled = false;
      } else {
        if (data.progress) {
          renderProgress(data.progress);
        } else {
          // Fallback: show connecting state when progress not yet available
          progressMsg.innerHTML = '正在连接 AI 服务<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>';
          progressDetail.textContent = '等待翻译任务启动...';
        }
      }
    } catch (err) {
      clearInterval(interval);
      showError('状态检查失败：' + err.message);
      progressSection.classList.remove('visible');
      btnTranslate.disabled = false;
    }
  }, 2000);
}

function showResults(results, isRevision) {
  resultsSection.classList.remove('hidden');
  resultsList.innerHTML = '';
  const completed = results.filter(r => r.status === 'completed');
  const label = isRevision ? '已修改' : '翻译完成';
  btnDownloadAll.style.display = completed.length > 1 ? 'inline' : 'none';
  resultsCount.textContent = `${completed.length}/${results.length} 个文件 · ${label}`;

  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    const isOk = r.status === 'completed';

    // Status icon (checkmark circle)
    const iconDiv = document.createElement('div');
    iconDiv.className = 'status-icon';
    const checkBg = document.createElement('div');
    checkBg.className = 'check-bg';
    iconDiv.appendChild(checkBg);
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('class', 'check-path');
    path.setAttribute('d', 'M5 13l4 4L19 7');
    svg.appendChild(path);
    iconDiv.appendChild(svg);
    div.appendChild(iconDiv);

    // File info
    const infoDiv = document.createElement('div');
    infoDiv.className = 'info';
    const filenameEl = document.createElement('div');
    filenameEl.className = 'filename';
    filenameEl.textContent = uploadedFiles[i]?.name || r.file_id;
    infoDiv.appendChild(filenameEl);

    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    const badgeClass = isOk ? 'badge-success' : 'badge-error';
    const badgeText = isOk ? (isRevision ? '已修改' : '完成') : '失败';
    metaDiv.innerHTML = '<span class="badge ' + badgeClass + '">' + badgeText + '</span>';
    if (r.error) {
      metaDiv.innerHTML += '<span style="color:var(--error-text);font-size:13px;">' + r.error + '</span>';
    }
    if (isOk && isRevision) {
      metaDiv.innerHTML += '<span class="revision-badge">已修订</span>';
    }
    infoDiv.appendChild(metaDiv);
    div.appendChild(infoDiv);

    // Action buttons
    if (isOk) {
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'actions';
      const prevBtn = document.createElement('button');
      prevBtn.className = 'btn-download btn-preview';
      prevBtn.textContent = '预览';
      actionsDiv.appendChild(prevBtn);
      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn-download';
      dlBtn.textContent = '下载';
      actionsDiv.appendChild(dlBtn);
      div.appendChild(actionsDiv);

      const fileId = r.file_id;
      dlBtn.addEventListener('click', () => {
        window.open(`${API_BASE}/result/${currentJobId}?file_id=${fileId}`, '_blank');
      });
      prevBtn.addEventListener('click', () => openPreview(currentJobId, fileId));
    }

    resultsList.appendChild(div);

    // Animate checkmark appearing (staggered)
    if (isOk) {
      setTimeout(() => {
        iconDiv.classList.add('checked');
        // A subtle spring to the whole item
        div.style.transform = 'scale(1)';
      }, 200 + i * 120);
    }
  });
}

// ---------------------------------------------------------------------------
// Re-translate
// ---------------------------------------------------------------------------
btnRetranslate.addEventListener('click', async () => {
  if (!currentJobId) return;
  const feedback = feedbackText.value.trim();
  if (!feedback) { showError('请先描述需要修正的问题'); return; }

  btnRetranslate.disabled = true;
  progressSection.classList.add('visible');
  renderProgressInit();
  hideError();

  try {
    const revBody = { job_id: currentJobId, feedback };
    const revCustomApi = getCustomAPI();
    if (revCustomApi) revBody.custom_api = revCustomApi;
    const res = await fetch(`${API_BASE}/revise`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(revBody)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '重新翻译失败'); }
    const data = await res.json();
    currentJobId = data.job_id;

    const interval = setInterval(async () => {
      try {
        const r = await fetch(`${API_BASE}/status/${currentJobId}`);
        const d = await r.json();
        if (d.status === 'completed') {
          clearInterval(interval);
          progressFiles.querySelectorAll('.progress-file').forEach(el => {
            el.className = 'progress-file pf-done';
          });
          setTimeout(() => {
            progressSection.classList.remove('visible');
            showResults(d.results || [], true);
          }, 500);
          btnRetranslate.disabled = false;
        } else if (d.status === 'failed') {
          clearInterval(interval);
          showError('重新翻译失败：' + (d.error || '未知错误'));
          progressSection.classList.remove('visible');
          btnRetranslate.disabled = false;
        } else {
          if (d.progress) renderProgress(d.progress);
        }
      } catch (err) {
        clearInterval(interval);
        showError('状态检查失败');
        progressSection.classList.remove('visible');
        btnRetranslate.disabled = false;
      }
    }, 2000);
  } catch (err) {
    showError('重新翻译启动失败：' + err.message);
    progressSection.classList.remove('visible');
    btnRetranslate.disabled = false;
  }
});

// ---------------------------------------------------------------------------
// Download All
// ---------------------------------------------------------------------------
btnDownloadAll.addEventListener('click', () => {
  if (!currentJobId) return;
  window.open(`${API_BASE}/download-all/${currentJobId}`, '_blank');
});

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function enableTranslateIfReady() {
  btnTranslate.disabled = !(glossaryId && fileIds.length);
}

function showError(msg) {
  toastError.textContent = msg;
  toastError.classList.add('visible');
}

function hideError() {
  toastError.classList.remove('visible');
}

// ---------------------------------------------------------------------------
// Preview modal
// ---------------------------------------------------------------------------
function renderRun(run) {
  let text = run.text;
  if (!text) return '';
  // Escape HTML
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  if (!run.bold && !run.italic && !run.underline && !run.color && !run.font_size) {
    return text;
  }
  let style = '';
  if (run.bold) style += 'font-weight:700;';
  if (run.italic) style += 'font-style:italic;';
  if (run.underline) style += 'text-decoration:underline;';
  if (run.color) style += `color:#${run.color};`;
  if (run.font_size) style += `font-size:${run.font_size}pt;`;
  if (run.font_name) style += `font-family:'${run.font_name.replace(/'/g, "\\'")}',serif;`;
  return `<span style="${style}">${text}</span>`;
}

function renderParagraph(para) {
  if (!para.text.trim()) {
    return '<div class="preview-para preview-empty"></div>';
  }
  let alignStyle = '';
  if (para.alignment === 0) alignStyle = 'text-align:left;';
  else if (para.alignment === 1) alignStyle = 'text-align:center;';
  else if (para.alignment === 2) alignStyle = 'text-align:right;';
  else if (para.alignment === 3) alignStyle = 'text-align:justify;';
  const runsHtml = para.runs.map(renderRun).join('');
  return `<div class="preview-para" style="${alignStyle}">${runsHtml}</div>`;
}

async function openPreview(jobId, fileId) {
  try {
    const res = await fetch(`${API_BASE}/preview/${jobId}?file_id=${fileId}`);
    if (!res.ok) throw new Error('预览加载失败');
    const data = await res.json();
    const preview = data.previews[0];
    if (!preview) { showError('未找到预览内容'); return; }
    const modalBody = document.getElementById('modal-body');
    modalBody.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'file-header';
    header.textContent = fileId;
    modalBody.appendChild(header);
    const contentDiv = document.createElement('div');
    if (preview.paragraphs) {
      contentDiv.innerHTML = preview.paragraphs.map(renderParagraph).join('');
    } else {
      contentDiv.textContent = '[文件不存在]';
    }
    modalBody.appendChild(contentDiv);
    document.getElementById('modal-overlay').classList.add('visible');
  } catch (err) {
    showError('预览加载失败：' + err.message);
  }
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('visible');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modal-overlay').classList.remove('visible');
  }
});
</script>
